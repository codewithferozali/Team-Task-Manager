# Server
server.port=${PORT:8080}

# Production (Railway) - uses environment variables
# Railway automatically provides MYSQLHOST, MYSQLPORT, MYSQLDATABASE, MYSQLUSER, MYSQLPASSWORD
spring.datasource.url=${MYSQL_URL:jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:teamtaskdb}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:root}

jwt.secret=${JWT_SECRET:ChangeThisSecretInProduction_AtLeast32Characters}
jwt.expiration=${JWT_EXPIRATION:86400000}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
logging.level.com.teamtask=WARN
