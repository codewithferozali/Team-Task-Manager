# ===============================
# SERVER CONFIG
# ===============================
server.port=${PORT:8080}

# ===============================
# DATABASE (Railway MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ===============================
# JWT CONFIG
# ===============================
jwt.secret=TeamTaskManager_SuperSecretKey_2024_ChangeInProd_MinLength32Chars
jwt.expiration=86400000

# ===============================
# JACKSON CONFIG
# ===============================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=non_null

# ===============================
# LOGGING
# ===============================
logging.level.com.teamtask=INFO
logging.level.org.springframework.security=WARN

# ===============================
# STATIC RESOURCES
# ===============================
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**