# Server
server.port=9595

# Database (local dev)
spring.datasource.url=jdbc:mysql://localhost:3306/teamtaskdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=system
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT
jwt.secret=TeamTaskManager_SuperSecretKey_2024_ChangeInProd_MinLength32Chars
jwt.expiration=86400000

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=non_null

# Logging
logging.level.com.teamtask=INFO
logging.level.org.springframework.security=WARN

# Static resources
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**
# Remove or update this line:
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Use this instead (or let Hibernate auto-detect):
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
