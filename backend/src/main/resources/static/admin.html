<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Admin — TaskFlow</title>
  <link rel="stylesheet" href="/css/styles.css"/>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><path d="M5 13l4 4 11-11"/></svg></div>
      <span>TaskFlow</span>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-title">Menu</div>
        <a href="/dashboard.html" class="nav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a>
        <a href="/tasks.html" class="nav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>Tasks</a>
        <a href="/projects.html" class="nav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>Projects</a>
        <a href="/admin.html" class="nav-link active admin-only"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>Admin</a>
      </div>
    </nav>
    <div class="sidebar-user">
      <div class="user-info">
        <div class="user-avatar" id="sidebar-avatar">TU</div>
        <div><div class="user-name" id="sidebar-name">User</div><div class="user-role" id="sidebar-role">ADMIN</div></div>
      </div>
    </div>
  </aside>
  <div class="overlay-bg" id="overlay-bg"></div>

  <main class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="btn-icon menu-btn" id="menu-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <span class="topbar-title">Admin Panel</span>
      </div>
      <button class="btn btn-secondary btn-sm" id="logout-btn">Logout</button>
    </div>

    <div class="page">
      <div class="stats-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:28px">
        <div class="stat-card"><div class="stat-icon" style="background:rgba(124,58,237,.15)"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div><div><div class="stat-value" id="stat-users">—</div><div class="stat-label">Total Users</div></div></div>
        <div class="stat-card"><div class="stat-icon" style="background:rgba(6,182,212,.15)"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#06b6d4" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg></div><div><div class="stat-value" id="stat-projects">—</div><div class="stat-label">Projects</div></div></div>
        <div class="stat-card"><div class="stat-icon" style="background:rgba(16,185,129,.15)"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2"><path d="M9 11l3 3L22 4"/></svg></div><div><div class="stat-value" id="stat-tasks">—</div><div class="stat-label">Total Tasks</div></div></div>
      </div>

      <div class="card">
        <div class="page-header" style="margin-bottom:16px">
          <h2 style="font-size:1rem;font-weight:700">User Management</h2>
          <div class="search-wrap" style="max-width:240px">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input id="user-search" type="text" placeholder="Search users…" oninput="filterUsers()"/>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>User</th><th>Email</th><th>Role</th><th>Joined</th><th>Actions</th></tr></thead>
            <tbody id="users-table"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="/js/api.js"></script>
<script src="/js/admin.js"></script>
</body>
</html>
