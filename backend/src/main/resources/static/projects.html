<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Projects — TaskFlow</title>
  <link rel="stylesheet" href="/css/styles.css"/>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><path d="M5 13l4 4 11-11"/></svg></div>
      <span>TaskFlow</span>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-title">Menu</div>
        <a href="/dashboard.html" class="nav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a>
        <a href="/tasks.html" class="nav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>Tasks</a>
        <a href="/projects.html" class="nav-link active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>Projects</a>
        <a href="/admin.html" class="nav-link admin-only"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>Admin</a>
      </div>
    </nav>
    <div class="sidebar-user">
      <div class="user-info">
        <div class="user-avatar" id="sidebar-avatar">TU</div>
        <div><div class="user-name" id="sidebar-name">User</div><div class="user-role" id="sidebar-role">MEMBER</div></div>
      </div>
    </div>
  </aside>
  <div class="overlay-bg" id="overlay-bg"></div>

  <main class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="btn-icon menu-btn" id="menu-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <span class="topbar-title">Projects</span>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-primary btn-sm admin-only" onclick="openProjectModal()">+ New Project</button>
        <button class="btn btn-secondary btn-sm" id="logout-btn">Logout</button>
      </div>
    </div>

    <div class="page">
      <div class="filters">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input id="search" type="text" placeholder="Search projects…" oninput="filterProjects()"/>
        </div>
        <select class="form-input" id="filter-status" style="width:150px" onchange="filterProjects()">
          <option value="">All Status</option>
          <option value="ACTIVE">Active</option>
          <option value="ARCHIVED">Archived</option>
        </select>
      </div>
      <div class="projects-grid" id="projects-grid">
        <div class="empty"><p>Loading…</p></div>
      </div>
    </div>
  </main>
</div>

<!-- Project Modal -->
<div class="modal-overlay" id="project-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="proj-modal-title">New Project</span>
      <button class="btn-icon" onclick="closeModal('project-modal')">✕</button>
    </div>
    <input type="hidden" id="edit-proj-id"/>
    <div class="form-group"><label class="form-label">Project Name *</label><input id="p-name" class="form-input" placeholder="Project name"/></div>
    <div class="form-group"><label class="form-label">Description</label><textarea id="p-desc" class="form-input" rows="3" placeholder="What is this project about?"></textarea></div>
    <div class="form-group"><label class="form-label">Status</label>
      <select id="p-status" class="form-input"><option value="ACTIVE">Active</option><option value="ARCHIVED">Archived</option></select></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('project-modal')">Cancel</button>
      <button class="btn btn-primary" id="proj-save-btn" onclick="saveProject()">Save</button>
    </div>
  </div>
</div>

<!-- Members Modal -->
<div class="modal-overlay" id="members-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Manage Members</span>
      <button class="btn-icon" onclick="closeModal('members-modal')">✕</button>
    </div>
    <input type="hidden" id="members-proj-id"/>
    <div id="members-list" style="margin-bottom:20px"></div>
    <div class="divider"></div>
    <div style="display:flex;gap:10px;align-items:flex-end">
      <div class="form-group" style="flex:1;margin:0"><label class="form-label">Add Member</label>
        <select id="add-user-sel" class="form-input"><option value="">Select user…</option></select></div>
      <select id="add-role-sel" class="form-input" style="width:120px"><option value="MEMBER">Member</option><option value="LEAD">Lead</option></select>
      <button class="btn btn-primary btn-sm" onclick="addMember()">Add</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/projects.js"></script>
</body>
</html>
